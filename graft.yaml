managers:
  arch: pacman -S --noconfirm
  cachyos: pacman -S --noconfirm
  macos: brew install
  ubuntu: sudo apt install -y
packages:
  helix:
    os:
    - macos
    - linux
    files:
      helix/: ~/.config/helix
  starship:
    os:
    - macos
    - linux
    files:
      starship/starship.toml: ~/.config/starship.toml
  fastfetch:
    os:
    - macos
    - linux
  ghostty:
    os:
    - macos
    - linux
    files:
      ghostty/: ~/.config/ghostty
  fish:
    os:
    - macos
    - linux
    files:
      fish/: ~/.config/fish
  pandoc:
    os:
    - macos
    - linux
    files:
      pandoc/: ~/.config/pandoc
  yazi:
    os:
    - macos
    - linux
    files:
      yazi/: ~/.config/yazi
  hypr:
    os:
    - linux
    files:
      hypr/: ../.config/hypr
    link_mode: symlink
  waybar:
    os:
    - linux
    files:
      waybar/: ../.config/waybar
    link_mode: symlink
